<title>ShareGate Protect ROI Calculator</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{margin:0;padding:0;background:#F0EEE9;min-height:100vh;font-family:'Inter',sans-serif;color:#0D0D0D;-webkit-font-smoothing:antialiased}
:root{--lilac:#B4ABFF;--lilac-light:#DAD5FF;--lilac-bg:#F5F4FF;--lime:#CCFF00;--orange:#FF5500;--g100:#F7F7F8;--g200:#E8E8EA;--g300:#D1D1D6;--g500:#6E6E73;--err:#DC3545;--black:#0D0D0D}
.wrap{max-width:720px;margin:40px auto;padding:0 20px}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,0.09)}
.progress{height:3px;background:var(--g200)}.progress-fill{height:3px;background:var(--lilac);transition:width .3s}
.quiz-head{padding:32px 32px 0}.step-label{font-size:13px;color:var(--g500);text-transform:uppercase;letter-spacing:.08em}
.quiz-body{padding:16px 32px 32px;display:flex;flex-direction:column;gap:14px}
h2.q{font-size:17px;font-weight:700;line-height:1.35}p.sub{font-size:15px;color:var(--g500);line-height:1.55}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1.5px solid var(--g200);border-radius:10px;cursor:pointer;text-align:left;background:none;font-family:inherit;width:100%;transition:border-color .15s,background .15s}
.opt:hover,.opt.sel{border-color:var(--lilac);background:var(--lilac-bg)}
.dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--g300);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.opt.sel .dot{border-color:var(--lilac);background:var(--lilac)}.dot-inner{width:6px;height:6px;border-radius:50%;background:#fff}
.opt-text strong{display:block;font-size:15px;font-weight:600;margin-bottom:1px}.opt-text span{font-size:13px;color:var(--g500);line-height:1.4}
.inp-wrap{position:relative;display:flex;align-items:center}
.inp-prefix{position:absolute;left:14px;font-size:15px;font-weight:500;color:var(--g500)}
.inp{width:100%;padding:13px 14px;font-size:15px;font-family:inherit;border:1.5px solid var(--g200);border-radius:10px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.inp.has-pre{padding-left:30px}.inp:focus{border-color:var(--lilac)}
.helper{font-size:13px;color:var(--g500);line-height:1.5;margin-top:4px}
.nav{display:flex;align-items:center;gap:8px;padding-top:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 32px;background:transparent;color:#1f1b1b;border:2px solid #1f1b1b;border-radius:4px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;transition:background .15s,color .15s}
.btn:hover{background:#1f1b1b;color:#fff}.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn2{display:inline-flex;align-items:center;gap:5px;padding:10px 14px;background:none;color:var(--g500);border:none;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer}.btn2:hover{color:#0D0D0D}
.btn-cta{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;background:var(--lilac);color:var(--black);border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:opacity .15s}.btn-cta:hover{opacity:.85}
.res{padding:36px 32px;display:flex;flex-direction:column;gap:0}
.logo-header{margin-bottom:20px}
.logo-header svg{height:56px;width:auto}
.edit-toggle{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:500;color:var(--g500);background:none;border:none;cursor:pointer;padding:0;transition:color .15s;align-self:flex-start;margin-bottom:20px}.edit-toggle:hover{color:var(--black)}
.edit-panel{background:var(--g100);border-radius:10px;padding:14px;margin-bottom:20px}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.ef{display:flex;flex-direction:column;gap:4px}
.ef label{font-size:10px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.07em}
.ef input,.ef select{font-family:inherit;font-size:13px;padding:6px 10px;border:1.5px solid var(--g200);border-radius:8px;background:#fff;color:var(--black);outline:none;width:100%;-webkit-appearance:none;appearance:none}
.ef input:focus,.ef select:focus{border-color:var(--lilac)}.ef select{padding-right:26px;cursor:pointer}
.hero-area{background:var(--black);border-radius:14px;padding:28px 24px 20px;margin-bottom:16px}
.hero-eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,0.7);margin-bottom:8px}
.hero-amount{font-size:36px;font-weight:800;color:var(--lime);line-height:1.1;letter-spacing:-0.02em;margin-bottom:16px}
.hero-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.08);border-radius:8px;overflow:hidden}
.hero-kpi{background:var(--black);padding:14px 16px}
.hero-kpi-label{font-size:11px;color:rgba(255,255,255,0.7);font-weight:500;margin-bottom:4px}
.hero-kpi-val{font-size:18px;font-weight:700;color:#fff}
.biggest{background:var(--g100);border-radius:0;padding:14px 18px;border-bottom:1px solid var(--g200)}
.biggest-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g500);margin-bottom:4px}
.biggest-text{font-size:13px;font-weight:500;line-height:1.55;color:var(--black)}.biggest-text strong{font-weight:700}
.section-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g500);margin-bottom:12px}
.breakdown{display:flex;flex-direction:column;gap:0;margin-bottom:20px;border:1px solid var(--g200);border-radius:12px;overflow:hidden}
.bk-item{padding:16px 18px;border-bottom:1px solid var(--g200);display:flex;flex-direction:column;gap:8px}.bk-item:last-child{border-bottom:none}
.bk-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.bk-label{font-size:14px;font-weight:600;color:var(--black);line-height:1.3}
.bk-value{font-size:15px;font-weight:700;color:var(--black);white-space:nowrap}
.bk-track{height:6px;background:var(--g200);border-radius:3px;overflow:hidden}
.bk-fill{height:100%;border-radius:3px;transition:width .4s}
.bk-fill.orange{background:var(--orange)}.bk-fill.lilac{background:var(--lilac)}.bk-fill.lime{background:var(--lime)}
.bk-meta{font-size:12px;color:var(--g500)}
.cost-card{background:var(--g100);border-radius:12px;padding:18px 20px;margin-bottom:16px;display:flex;flex-direction:column;gap:10px}
.cost-row{display:flex;justify-content:space-between;align-items:center}
.cost-label{font-size:13px;color:var(--g500);font-weight:500}.cost-val{font-size:13px;font-weight:700;color:var(--black)}
.cost-divider{height:1px;background:var(--g200)}
.cost-row-big .cost-label{font-size:14px;font-weight:600;color:var(--black)}.cost-row-big .cost-val{font-size:16px}
.cost-val.pos{color:#16a34a}
.roi-note{font-size:13px;color:var(--g500);line-height:1.55;padding:12px 14px;background:var(--g100);border-left:3px solid var(--lilac);border-radius:0 8px 8px 0;margin-bottom:16px}
.cta-box{background:var(--lilac-bg);border:1.5px solid var(--lilac-light);border-radius:12px;padding:22px 24px;display:flex;flex-direction:column;gap:10px}
.cta-box h3{font-size:16px;font-weight:700;color:var(--black)}.cta-box p{font-size:14px;color:var(--g500);line-height:1.55}
.secondary-cta{font-size:13px;color:var(--g500);line-height:1.5;margin-top:12px;text-align:left}
.secondary-cta a{color:var(--lilac);font-weight:600;text-decoration:none}.secondary-cta a:hover{text-decoration:underline}
.pdf-btn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:500;color:var(--g500);background:none;border:1px solid var(--g200);border-radius:8px;padding:8px 14px;cursor:pointer;transition:border-color .15s,color .15s;margin-top:8px;align-self:flex-start}.pdf-btn:hover{border-color:var(--black);color:var(--black)}
.insight-box{background:#FFFDE7;border-left:3px solid #FFD600;border-radius:0 8px 8px 0;padding:12px 14px;margin-top:8px;font-size:13px;color:var(--black);line-height:1.55}
.print-only{display:none}
@media print{
body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.wrap{margin:0;padding:0;max-width:100%}
.card{box-shadow:none;border-radius:0}

.edit-toggle,.edit-panel,.pdf-btn,.btn-cta,.secondary-cta{display:none!important}
.print-only{display:inline!important}
.screen-only{display:none!important}

.hero-amount{

}

.bk-track{height:4px!important}

  margin-bottom:8px!important;
  gap:6px!important;
}
.cost-label,.cost-val{font-size:11px!important}

.cta-box{
  background:var(--lilac-bg)!important;

  border-radius:10px!important;
  padding:12px 14px!important;
  margin-top:4px!important;
  break-inside:avoid!important;
  gap:6px!important;
}
.cta-box h3{
  font-size:13px!important;
  margin-bottom:2px!important;
}
.cta-box p{
  font-size:11px!important;
  line-height:1.4!important;
}

@page{margin:0.3in}
}
}
</style>

{id:"q5",ty:"choice",q:"What new storage spend will you add in the coming year on top of what you paid last year?",sub:"The projected additional cost as Teams, SharePoint, and OneDrive usage grows. Not your total current storage bill.",
opts:[{v:"lt5k",l:"Less than $5,000",d:"Modest growth costs. Not anticipating major storage expansion this year."},
{v:"5k-15k",l:"$5,000 to $15,000",d:"Steady growth costs. Budgeted for moderate additional expenses."},
{v:"15k-45k",l:"$15,000 to $45,000",d:"Noticeable storage costs. Growth is steady and the increasing expense is being tracked."},
{v:"45k+",l:"$45,000+",d:"Significant storage investment. Substantial additional storage costs expected this year."},
{v:"not-sure",l:"Not sure"}]},
{id:"q6",ty:"choice",q:"What percentage of that storage growth comes from inactive or outdated content?",sub:"Your best guess at how much growth comes from abandoned teams, duplicate sites, or workspaces that nobody manages anymore.",
opts:[{v:"lt10",l:"Less than 10%",d:"Pretty clean environment. Most storage growth comes from active, managed workspaces."},
{v:"10-25",l:"10 to 25%",d:"Some digital clutter. Abandoned workspaces and duplicates eating up storage, but it's not terrible."},
{v:"25-50",l:"25 to 50%",d:"Digital mess is piling up. A good chunk of storage growth comes from redundant, obsolete, and trivial content."},
{v:"50+",l:"50%+",d:"Sprawl is a real problem. Lots of forgotten, duplicate, or orphaned workspaces taking up expensive storage space."},
{v:"not-sure",l:"Not sure"}]},
{id:"q7",ty:"choice",q:"How would you describe your tenant's governance maturity?",sub:"",
opts:[{v:"low",l:"Low",d:"We react to problems when they pop up, but don't have formal governance processes in place."},
{v:"medium",l:"Medium",d:"We've got some processes and can see what's happening, but enforcement is inconsistent."},
{v:"high",l:"High",d:"Good processes, decent visibility, and consistent governance, though it still takes some manual work to keep things clean."},
{v:"not-sure",l:"Not sure"}]},
{id:"licTier",ty:"choice",q:"What license tier do most of your users have?",sub:"Microsoft is raising M365 prices in July 2026, so license optimization is more urgent than ever.",
opts:[{v:"basic",l:"Business Basic or Standard"},{v:"premium",l:"Business Premium"},{v:"e3",l:"E3"},{v:"e5",l:"E5"},{v:"e7",l:"E7"},{v:"mixed",l:"Mixed or not sure"}]},
{id:"licOpt",ty:"choice",q:"When was the last time someone checked whether your users actually need the license tier they're assigned?",sub:"",
opts:[{v:"never",l:"We've never done this"},{v:"over-year",l:"More than a year ago"},{v:"within-year",l:"Within the last year"},{v:"not-sure",l:"Not sure"}]}
];

var TOTAL=QS.length;

function countNotSure(a){
var count=0;
if(a.q2==='not-sure')count++;
if(a.q3==='not-sure')count++;
if(a.q4==='not-sure')count++;
if(a.q5==='not-sure')count++;
if(a.q6==='not-sure')count++;
if(a.q7==='not-sure')count++;
if(a.licOpt==='not-sure')count++;
return count;
}

function calc(a){
var mat=matMap[a.q7]||matMap.medium;
var pLo=mat.rLo,pHi=mat.rHi;
var q2=idMap[a.q2]||idMap["5-10"],q3=fixMap[a.q3]||fixMap["5-10"];
var q4=aiMap[a.q4]||aiMap.none,q5=stoMap[a.q5]||stoMap.lt5k,q6=inMap[a.q6]||inMap.lt10;
var sal=Number(a.salary)||85000,users=Number(a.userCount)||0;
var hr=(sal*SM)/HY;
var lic=licMap[a.licTier]||licMap.mixed;
var opt=optMap[a.licOpt]||optMap["not-sure"];

function bk(m,ann){var x=ann?12:1;return{lo:m.lo*x*hr*pLo,hi:m.hi*x*hr*pHi,hlo:m.lo*x*pLo,hhi:m.hi*x*pHi};}
var id=bk(q2,true),fx=bk(q3,true),ai=bk(q4,!q4.ot);
var ov={slo:id.lo+fx.lo,shi:id.hi+fx.hi,hlo:id.hlo+fx.hlo,hhi:id.hhi+fx.hhi};
var cp={slo:ai.lo,shi:ai.hi,hlo:ai.hlo,hhi:ai.hhi};

var stRL=Math.min(pLo,0.15),stRH=Math.min(pHi,0.15);
var st={slo:q5.lo*q6.lo*stRL,shi:q5.hi*q6.hi*stRH};

var wasteAdj=opt.waste;
if(users>5000)wasteAdj=opt.waste*0.50;
else if(users>1000)wasteAdj=opt.waste*0.75;
var licBase=users*lic.cost*12*wasteAdj*0.50;
var li={slo:licBase*0.8,shi:licBase*1.2};

var tlo=ov.slo+cp.slo+st.slo+li.slo;
var thi=ov.shi+cp.shi+st.shi+li.shi;
var thlo=ov.hlo+cp.hlo,thhi=ov.hhi+cp.hhi;
var ac=users*CPU,avg=(tlo+thi)/2;
var roi=ac>0?Math.round((avg-ac)/ac*100):null;
var pb=null;if(avg>0&&ac>0){var m=ac/avg*12;pb=m>12?"> 12 months":Math.round(m)+" months";}
return{tlo:tlo,thi:thi,thlo:thlo,thhi:thhi,ac:ac,nlo:tlo-ac,nhi:thi-ac,roi:roi,pb:pb,ml:(mat).l||"",ov:ov,cp:cp,st:st,li:li};
}

function fD(n){var v=Math.round(n);if(v<0)return"-$"+Math.abs(v).toLocaleString("en-US");return"$"+v.toLocaleString("en-US");}
function fRpos(a,b){return Math.max(0,Math.round(a))===Math.max(0,Math.round(b))?fD(Math.max(0,a)):fD(Math.max(0,a))+" to "+fD(Math.max(0,b));}
function fR(a,b){a=Math.round(a);b=Math.round(b);return a===b?fD(a):fD(a)+" to "+fD(b);}
function fH(a,b){a=Math.round(a);b=Math.round(b);return a===b?a.toLocaleString():a.toLocaleString()+" to "+b.toLocaleString();}

function getProgressPercent(step){
var weights=[18,14,12,11,10,9,8,7,6,5];
var total=0;
for(var i=0;i<=step&&i<weights.length;i++)total+=weights[i];
return total;
}

var app=document.getElementById("app");
var step=0,ans={},view="quiz",editOpen=false;
function go(){if(view==="quiz")renderQuiz();else renderResults();}

function renderQuiz(){
var q=QS[step],pct=getProgressPercent(step);
var cv=ans[q.id]||"";
var isLast=step===TOTAL-1;
var valid=false;
if(q.ty==="choice")valid=!!cv;
else if(q.ty==="number")valid=cv!==""&&Number(cv)>=q.min;
else if(q.ty==="salary"){if(!cv&&q.def){ans[q.id]=q.def;cv=q.def;}valid=cv!==""&&Number(cv)>=q.min;}

var h='<div class="quiz-head"></div>';
h+='<div class="quiz-body"><h2 class="q">'+q.q+'</h2>';
if(q.sub)h+='<p class="sub">'+q.sub+'</p>';
if(q.ty==="choice"){
h+='<div class="opts">';
for(var i=0;i<q.opts.length;i++){var o=q.opts[i],sel=cv===o.v;
h+='<button class="opt'+(sel?' sel':'')+'" data-v="'+o.v+'"><div class="dot">'+(sel?'<div class="dot-inner"></div>':'')+'</div><div class="opt-text"><strong>'+o.l+'</strong>'+(o.d?'<span>'+o.d+'</span>':'')+'</div></button>';}
h+='</div>';
}else if(q.ty==="number"){
h+='<div class="inp-wrap"><input class="inp" type="text" inputmode="numeric" value="'+cv+'" placeholder="'+(q.ph||"")+'" id="qi"></div>';
}else if(q.ty==="salary"){
h+='<div class="inp-wrap"><span class="inp-prefix">$</span><input class="inp has-pre" type="text" inputmode="numeric" value="'+cv+'" id="qi"></div>';
if(q.help)h+='<p class="helper">'+q.help+'</p>';
}

h+='<div class="nav">';
if(step>0)h+='<button class="btn2" id="bk">Back</button>';
h+='<button class="btn" id="nx"'+(valid?'':' disabled')+'>'+(isLast?'See my results':'Next')+'</button>';
h+='</div></div>';
h+='<div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
app.innerHTML=h;

var opts=app.querySelectorAll('.opt');
for(var i=0;i<opts.length;i++){opts[i].addEventListener('click',function(){ans[QS[step].id]=this.getAttribute('data-v');go();});}
var qi=document.getElementById('qi');
if(qi){
qi.focus();
qi.addEventListener('input',function(){
ans[QS[step].id]=this.value.replace(/[^0-9]/g,'');
var nx=document.getElementById('nx');
var v=ans[QS[step].id];
var ok=v!==""&&Number(v)>=QS[step].min;
if(nx){if(ok)nx.removeAttribute('disabled');else nx.setAttribute('disabled','');}
});
qi.addEventListener('keydown',function(e){
if(e.key==='Enter'){
var nx=document.getElementById('nx');
if(nx&&!nx.hasAttribute('disabled'))nx.click();
}
});
}
var nx=document.getElementById('nx');
if(nx){nx.addEventListener('click',function(){if(this.hasAttribute('disabled'))return;if(isLast){view="results";go();}else{step++;go();}});}
var bk=document.getElementById('bk');
if(bk){bk.addEventListener('click',function(){if(step>0){step--;go();}});}
}

function renderResults(){
var r=calc(ans);
var notSureCount=countNotSure(ans);
var tavg=(r.tlo+r.thi)/2;
var bkts=[
{k:"ov",lbl:"Cleaning up who has access to what",avg:(r.ov.slo+r.ov.shi)/2,lo:r.ov.slo,hi:r.ov.shi,hrs:{lo:r.ov.hlo,hi:r.ov.hhi},c:"orange"},
{k:"cp",lbl:"Getting ready for Copilot without the risk",avg:(r.cp.slo+r.cp.shi)/2,lo:r.cp.slo,hi:r.cp.shi,hrs:{lo:r.cp.hlo,hi:r.cp.hhi},c:"lilac"},
{k:"st",lbl:"Removing inactive workspaces and stale content",avg:(r.st.slo+r.st.shi)/2,lo:r.st.slo,hi:r.st.shi,hrs:null,c:"lime"},
{k:"li",lbl:"Rightsizing unused and over-provisioned licenses",avg:(r.li.slo+r.li.shi)/2,lo:r.li.slo,hi:r.li.shi,hrs:null,c:"orange"}
];
var big=bkts[0];for(var i=1;i<bkts.length;i++){if(bkts[i].avg>big.avg)big=bkts[i];}
var bigPct=tavg>0?Math.round(big.avg/tavg*100):0;

var h='<div class="res" id="res-content">';

// Add ShareGate logo header
h+='<div class="logo-header">'+SHAREGATE_LOGO+'</div>';

h+='<button class="edit-toggle" id="toggle-edit"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 9.5V12h2.5l6.9-6.9-2.5-2.5L1 9.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
h+='Change answers <svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="transition:transform .2s;transform:rotate('+(editOpen?'180':'0')+'deg)"><path d="M2.5 4l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';

if(editOpen){
h+='<div class="edit-panel"><div class="edit-grid">';
h+='<div class="ef"><label>1. Users in tenant</label><input type="text" inputmode="numeric" value="'+(ans.userCount||'')+'" data-k="userCount"></div>';
h+='<div class="ef"><label>2. Annual IT salary</label><div style="position:relative;display:flex;align-items:center"><span style="position:absolute;left:10px;font-size:13px;color:var(--g500)">$</span><input type="text" inputmode="numeric" value="'+(ans.salary||'')+'" data-k="salary" style="padding-left:22px"></div></div>';
var eMaps=[{k:"q2",l:"3. Identification hrs/mo",m:idMap},{k:"q3",l:"4. Remediation hrs/mo",m:fixMap},{k:"q4",l:"5. AI readiness effort",m:aiMap},{k:"q5",l:"6. Incremental storage",m:stoMap},{k:"q6",l:"7. Inactive content %",m:inMap},{k:"q7",l:"8. Governance maturity",m:matMap}];
for(var ei=0;ei<eMaps.length;ei++){var em=eMaps[ei];
h+='<div class="ef"><label>'+em.l+'</label><div style="position:relative"><select data-k="'+em.k+'">';
var keys=Object.keys(em.m);for(var ej=0;ej<keys.length;ej++){var ek=keys[ej],el=em.m[ek].l;
h+='<option value="'+ek+'"'+(ans[em.k]===ek?' selected':'')+'>'+el+'</option>';}
h+='</select><div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--g500);pointer-events:none"></div></div></div>';}
h+='<div class="ef"><label>9. License tier</label><div style="position:relative"><select data-k="licTier">';
var lk=Object.keys(licMap);for(var li=0;li<lk.length;li++){h+='<option value="'+lk[li]+'"'+(ans.licTier===lk[li]?' selected':'')+'>'+licMap[lk[li]].l+'</option>';}
h+='</select><div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--g500);pointer-events:none"></div></div></div>';
h+='<div class="ef"><label>10. License review</label><div style="position:relative"><select data-k="licOpt">';
var ok2=Object.keys(optMap);for(var oi=0;oi<ok2.length;oi++){h+='<option value="'+ok2[oi]+'"'+(ans.licOpt===ok2[oi]?' selected':'')+'>'+optMap[ok2[oi]].l+'</option>';}
h+='</select><div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--g500);pointer-events:none"></div></div></div>';
h+='</div></div>';}

h+='<div class="hero-area"><div class="hero-eyebrow">Estimated annual savings</div>';
h+='<div class="hero-amount">'+fRpos(r.tlo,r.thi)+'</div>';
h+='<div class="hero-kpis">';
h+='<div class="hero-kpi"><div class="hero-kpi-label">Hours reclaimed</div><div class="hero-kpi-val" style="color:#FF5500">'+fH(r.thlo,r.thhi)+'</div></div>';
h+='<div class="hero-kpi"><div class="hero-kpi-label">ROI</div><div class="hero-kpi-val" style="color:#B4ABFF">'+(r.roi!==null?r.roi+'%':'N/A')+'</div></div>';
h+='<div class="hero-kpi"><div class="hero-kpi-label">Payback</div><div class="hero-kpi-val" style="color:#CCFF00">'+(r.pb||'N/A')+'</div></div>';
h+='</div></div>';

h+='<div class="section-label">Savings breakdown</div><div class="breakdown">';
if(tavg>0){h+='<div class="biggest"><div class="biggest-label">Biggest opportunity</div>';
h+='<div class="biggest-text">Most of your savings come from <strong>'+big.lbl.toLowerCase()+'</strong>. That\'s <strong>'+bigPct+'%</strong> of your total estimated value.</div></div>';}
for(var i=0;i<bkts.length;i++){var b=bkts[i];
// Changed: Now using actual percentage of total instead of relative to max
var pct=tavg>0?Math.max(4,Math.round(b.avg/tavg*100)):0;
var bpct=tavg>0?Math.round(b.avg/tavg*100):0;
h+='<div class="bk-item"><div class="bk-row"><span class="bk-label">'+b.lbl+'</span><span class="bk-value">'+fRpos(b.lo,b.hi)+'</span></div>';
h+='<div class="bk-track"><div class="bk-fill '+b.c+'" style="width:'+pct+'%"></div></div>';
var meta=bpct+'% of total';
if(b.hrs)meta+=' · '+fH(Math.round(b.hrs.lo),Math.round(b.hrs.hi))+' hrs reclaimed';
h+='<div class="bk-meta">'+meta+'</div></div>';}
h+='</div>';

h+='<div class="cost-card">';
h+='<div class="cost-row"><span class="cost-label">Annual Protect cost ('+Number(ans.userCount).toLocaleString()+' users × $'+CPU+'/user)</span><span class="cost-val">'+fD(r.ac)+'</span></div>';
h+='<div class="cost-divider"></div>';
h+='<div class="cost-row cost-row-big"><span class="cost-label">Net annual value</span><span class="cost-val pos">'+fRpos(r.nlo,r.nhi)+'</span></div></div>';

var isNeg=r.nhi<=0;
var isBorderline=r.nlo<0&&r.nhi>0;
var needsMsg=isNeg||isBorderline;

var ctaHeader='See what this looks like in your tenant';
var ctaBody='These are just ballpark estimates. <span class="screen-only">Talk to a ShareGate expert to get a more tailored number based on what\'s actually happening in your Microsoft 365 environment.</span><span class="print-only">For a tailored assessment of your tenant, reach out to us at sharegate.com/contact</span>';
var ctaBtn='Book a call';
var ctaLink='https://sharegate.com/contact';

if(needsMsg){
var isHighMat=ans.q7==='high';
var isLowMat=ans.q7==='low';
var isSmall=(Number(ans.userCount)||0)<300&&ans.licTier==='basic'&&ans.q5==='lt5k';
var lowOpts=['5-10','10-20','not-sure'];
var lowAiOpts=['none','onetime-sm','not-sure'];
var lowStoOpts=['lt5k','5k-15k','not-sure'];
var lowInOpts=['lt10','10-25','not-sure'];
var hasLowInputs=(lowOpts.indexOf(ans.q2)>=0||lowOpts.indexOf(ans.q3)>=0||lowAiOpts.indexOf(ans.q4)>=0||(lowStoOpts.indexOf(ans.q5)>=0&&lowInOpts.indexOf(ans.q6)>=0));

if(notSureCount>=3){
ctaHeader='We need more detail';
ctaBody='You selected "Not sure" on several questions, which means this estimate is based on typical benchmarks rather than your actual environment. The real opportunity in your tenant could be significantly higher. <span class="screen-only">A quick conversation with a ShareGate expert can help you get a clearer picture.</span><span class="print-only">For a tailored assessment of your tenant, reach out to us at sharegate.com/contact</span>';
ctaBtn='Get a clearer picture';
}else if(isSmall){
ctaHeader='When your environment is small, your time matters even more';
ctaBody='Even in smaller tenants, governance takes time. And it\'s usually handled by someone already wearing multiple hats. Switching between tasks, tools, and admin centers slows everything down.\n\nProtect gives you one clear place to manage it all so you can move faster and get back to higher-impact work. <span class="screen-only">This calculator just gives a high-level estimate. Talk to a ShareGate expert for a deeper look at your tenant.</span><span class="print-only">For a tailored assessment of your tenant, reach out to us at sharegate.com/contact</span>';
ctaBtn='Book a call';
}else if(isHighMat&&hasLowInputs){
ctaHeader='You\'ve built strong processes. Protect keeps them simple.';
ctaBody='Orgs with mature governance often rely on a mix of tools, scripts, and manual checks to keep things running. Protect streamlines that patchwork into one place so you can see what matters and act fast.\n\nThe real opportunity for your team is consolidation. That goes beyond what this calculator can show. <span class="screen-only">Talk to a ShareGate expert to get a clearer view of your tenant.</span><span class="print-only">For a tailored assessment of your tenant, reach out to us at sharegate.com/contact</span>';
ctaBtn='See what you\'re missing';
}else if(isLowMat&&hasLowInputs){
ctaHeader='Low maturity + low governance hours usually means hidden risk';
ctaBody='When governance isn\'t actively managed, issues like oversharing, permission drift, and inactive workspaces compound quietly. Cleaning them up later always costs more than staying ahead of them now. Especially if you end up facing a security or compliance issue.\n\nProtect surfaces the highest-priority problems first so you can start governing without a massive time investment. <span class="print-only">For a tailored assessment of your tenant, reach out to us at sharegate.com/contact</span>';
ctaBtn='See what you\'re missing';
}
}

h+='<div class="cta-box"><h3>'+ctaHeader+'</h3>';
h+='<p style="white-space:pre-line">'+ctaBody+'</p>';
h+='<div><a href="'+ctaLink+'" class="btn-cta" target="_blank" rel="noopener noreferrer">'+ctaBtn+'</a></div></div>';

h+='<div class="secondary-cta">Download our <a href="https://sharegate.com/guides/it-governance-toolbox" target="_blank" rel="noopener noreferrer">free governance toolbox</a> to get checklists and templates to help you start cleaning up your M365 tenant.</div>';

h+='<button class="pdf-btn" id="pdf-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 4.5V1.5h7v3M3.5 10.5H2a.5.5 0 01-.5-.5V6a.5.5 0 01.5-.5h10a.5.5 0 01.5.5v4a.5.5 0 01-.5.5h-1.5M3.5 8h7v4.5h-7V8z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Save as PDF</button>';
h+='</div>';
app.innerHTML=h;

var tb=document.getElementById('toggle-edit');
if(tb){tb.addEventListener('click',function(){editOpen=!editOpen;go();});}
var edits=app.querySelectorAll('.ef input');
for(var ei=0;ei<edits.length;ei++){edits[ei].addEventListener('input',(function(el){return function(){
var k=el.getAttribute('data-k'),pos=el.selectionStart;ans[k]=el.value.replace(/[^0-9]/g,'');go();
var ref=app.querySelector('.ef input[data-k="'+k+'"]');if(ref){ref.focus();try{ref.setSelectionRange(pos,pos);}catch(e){}}
};})(edits[ei]));}
var selects=app.querySelectorAll('.ef select');
for(var si=0;si<selects.length;si++){selects[si].addEventListener('change',(function(el){return function(){ans[el.getAttribute('data-k')]=el.value;go();};})(selects[si]));}
var pdfBtn=document.getElementById('pdf-btn');
if(pdfBtn){pdfBtn.addEventListener('click',function(){editOpen=false;go();setTimeout(function(){window.print();},100);});}
}
go();
})();
